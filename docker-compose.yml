services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - silo-network

  # MinIO Object Storage
  storage:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${STORAGE_KEY}
      - MINIO_ROOT_PASSWORD=${STORAGE_SECRET}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - silo-network

  # MinIO Setup (Automated bucket creation)
  minio-setup:
    image: minio/mc
    depends_on:
      - storage
    environment:
      - STORAGE_KEY=${STORAGE_KEY}
      - STORAGE_SECRET=${STORAGE_SECRET}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://storage:9000 ${STORAGE_KEY} ${STORAGE_SECRET}) do echo '...waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb local/${STORAGE_BUCKET} || true;
      /usr/bin/mc anonymous set download local/${STORAGE_BUCKET};
      exit 0;
      "
    networks:
      - silo-network

  # Redis Cache (Optional as per docs)
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - silo-network

networks:
  silo-network:
    driver: overlay

volumes:
  postgres-data:
  minio-data:
  redis-data:
